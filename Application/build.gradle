plugins {
    id 'com.android.application'
}

// The sample build uses multiple directories to
// keep boilerplate and common code separate from
// the main sample code.
List<String> dirs = [
    'main',     // main sample code; look here for the interesting stuff.
    'common',   // components that are reused by multiple samples
    'template'] // boilerplate code that is generated by the sample template process

android {
    namespace = 'com.example.android.camera2basic'
    testNamespace = 'com.example.android.camera2basic.tests'
    enableKotlin = false
    compileSdk = 36
    buildToolsVersion = '36.1.0'

    defaultConfig {
        applicationId = 'com.example.android.camera2basic'
        minSdk = 21
        targetSdk = 36
        versionCode = 1
        versionName = '1.0'
        testInstrumentationRunner = 'androidx.test.runner.AndroidJUnitRunner'
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    lint {
        abortOnError = true
        warningsAsErrors = true
        checkDependencies = true
        // Android 17/API 37 is still a preview. Keep the stable Android 16
        // target while retaining every behavioral and security lint check.
        disable += ['GradleDependency', 'OldTargetApi']
        xmlReport = true
    }

    sourceSets {
        main.java.srcDirs = dirs.collect { "src/${it}/java" }
        main.res.srcDirs = dirs.collect { "src/${it}/res" }
        androidTest.setRoot('tests')
        androidTest.java.srcDirs = ['tests/src']
    }
}

dependencies {
    androidTestImplementation 'androidx.test:core:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.uiautomator:uiautomator:2.3.0'
}




